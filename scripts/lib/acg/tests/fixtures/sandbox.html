<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACG Sandbox Fixture</title>
  <style>
    body { font-family: sans-serif; background: #1a1a2e; color: #fff; padding: 20px; }
    button { padding: 8px 16px; margin: 4px; cursor: pointer; }
    .hidden { display: none; }
    [role="alertdialog"] {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: #2a2a3e; border: 1px solid #555; padding: 24px; z-index: 100;
      /* pando-style: the dialog container intercepts pointer events */
      pointer-events: auto;
    }
    /* Overlay is transparent to pointer events; alertdialog sits above via z-index */
    .dialog-overlay {
      position: fixed; inset: 0; z-index: 99; pointer-events: none;
    }
  </style>
</head>
<body>

<!-- State: card (Open Sandbox visible) -->
<div id="state-card">
  <button id="btn-open">Open Sandbox</button>
</div>

<!-- State: panel open (Delete Sandbox visible) -->
<div id="state-panel" class="hidden">
  <button id="btn-delete">Delete Sandbox</button>
  <div id="credential-fields">
    <input type="text" id="field-key-id" value="AKIA_FIXTURE_KEY_ID" readonly>
    <input type="text" id="field-secret" value="FIXTURE_SECRET_KEY" readonly>
  </div>
</div>

<!-- State: alertdialog (confirm deletion) -->
<div class="dialog-overlay"></div>
<div role="alertdialog" id="confirm-dialog" class="hidden">
  <h2>Delete AWS Sandbox?</h2>
  <p>This action cannot be undone.</p>
  <button id="btn-cancel">Cancel</button>
  <button id="btn-confirm-delete">Delete Sandbox</button>
</div>

<!-- Extend Your Session dialog (may appear any time) -->
<div role="dialog" id="extend-dialog" class="hidden">
  <h2>Extend Your Session</h2>
  <p>Would you like to extend your session?</p>
  <button id="btn-extend-cancel">Cancel</button>
  <button id="btn-extend-confirm">Extend Session</button>
</div>

<!-- State: deleted (Start Sandbox visible) -->
<div id="state-deleted" class="hidden">
  <button id="btn-start">Start Sandbox</button>
  <p>Auto Shutdown: Cloud Sandboxes are valid for four hours.</p>
</div>

<!-- Result indicator for test assertions -->
<div id="result" data-state="initial"></div>

<script>
  // Simulate React's document-level event delegation.
  // React attaches a single listener to the document root and routes events by target.
  // A bare el.click() in older React versions does NOT trigger these delegated handlers.
  // dispatchEvent(new MouseEvent('click', {bubbles:true})) DOES, because it bubbles.
  document.addEventListener('click', function(e) {
    const id = e.target && e.target.id;

    if (id === 'btn-open') {
      document.getElementById('state-card').classList.add('hidden');
      document.getElementById('state-panel').classList.remove('hidden');
      document.getElementById('result').dataset.state = 'panel-open';
      return;
    }

    if (id === 'btn-delete') {
      document.getElementById('confirm-dialog').classList.remove('hidden');
      document.getElementById('result').dataset.state = 'confirm-dialog-open';
      return;
    }

    if (id === 'btn-cancel') {
      document.getElementById('confirm-dialog').classList.add('hidden');
      document.getElementById('result').dataset.state = 'panel-open';
      return;
    }

    if (id === 'btn-confirm-delete') {
      document.getElementById('confirm-dialog').classList.add('hidden');
      document.getElementById('state-panel').classList.add('hidden');
      // Simulate backend deletion delay of 200ms before Start Sandbox appears
      setTimeout(function() {
        document.getElementById('state-deleted').classList.remove('hidden');
        document.getElementById('result').dataset.state = 'deleted';
      }, 200);
      return;
    }

    if (id === 'btn-start') {
      document.getElementById('state-deleted').classList.add('hidden');
      document.getElementById('result').dataset.state = 'started';
      return;
    }

    if (id === 'btn-extend-cancel') {
      document.getElementById('extend-dialog').classList.add('hidden');
      document.getElementById('result').dataset.state = 'extend-dismissed';
      return;
    }
  });

  // Helper: show extend dialog (called by test to simulate the interception)
  window.__showExtendDialog = function() {
    document.getElementById('extend-dialog').classList.remove('hidden');
  };

  // Helper: show already-deleted state directly (fast-path scenario)
  window.__setAlreadyDeleted = function() {
    document.getElementById('state-card').classList.add('hidden');
    document.getElementById('state-panel').classList.add('hidden');
    document.getElementById('state-deleted').classList.remove('hidden');
    document.getElementById('result').dataset.state = 'deleted';
  };
</script>
</body>
</html>
